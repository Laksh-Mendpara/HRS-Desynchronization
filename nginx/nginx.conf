worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # Keep the upstream connection alive so that the Varnish→backend socket
    # is reused and smuggled prefixes can persist in the buffer.
    keepalive_timeout  65;

    server {
        listen 80;
        server_name _;

        location / {
            proxy_pass         http://cache-layer:6081;
            proxy_http_version 1.1;

            # Keep the upstream connection open (required for desync).
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;

            # ── Desync-enabling (deliberately lenient) ───────────────────────
            # Forward Content-Length and Transfer-Encoding as-is so that Nginx
            # and the downstream Varnish/Gunicorn chain disagree on where the
            # request body ends, enabling CL.TE desynchronization.
            proxy_set_header   Content-Length    $content_length;
            proxy_pass_header  Transfer-Encoding;

            # Disable request buffering so Nginx streams bytes immediately
            # rather than waiting for the entire body.
            proxy_request_buffering off;
        }
    }
}
