worker_processes 1;

events {
    worker_connections 1024;
}

http {
    # Keep the upstream connection alive so smuggled prefixes persist in the
    # socket buffer between requests.
    keepalive_timeout  65;
    proxy_http_version 1.1;
    proxy_set_header   Connection "";

    server {
        listen 80;
        server_name _;

        # Security boundary: the frontend blocks direct access to /admin.
        location /admin {
            return 403 "Forbidden\n";
        }

        # All other requests are forwarded to the backend.
        location / {
            proxy_pass         http://backend:8000;

            # Forward the raw Content-Length and Transfer-Encoding headers
            # without normalisation so that Nginx and Gunicorn disagree on
            # where each request body ends.
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   Content-Length    $content_length;
            proxy_pass_header  Transfer-Encoding;
        }
    }
}
