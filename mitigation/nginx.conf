# ============================================================================
# nginx.conf  –  HARDENED / MITIGATED CONFIGURATION
# ============================================================================
# Changes vs. the vulnerable version (nginx/nginx.conf):
#
#   1. Reject any request that carries BOTH Content-Length and Transfer-Encoding.
#      These "dual-length" requests are the prerequisite for CL.TE desync.
#
#   2. Strip Transfer-Encoding before forwarding to the cache layer so that
#      the downstream Gunicorn process cannot be confused by a stray TE header.
#
#   3. Enable request buffering (proxy_request_buffering on) so that Nginx
#      reassembles the full request before proxying, eliminating partial-write
#      races that enable smuggling.
#
#   4. Enforce a strict Connection header to prevent connection-level header
#      injection via hop-by-hop header manipulation.
# ============================================================================

worker_processes 1;

events {
    worker_connections 1024;
}

http {
    keepalive_timeout 65;

    # Required: expose headers with underscores (e.g. Transfer_Encoding) to the map below.
    # Without this, Nginx silently drops Transfer_Encoding BEFORE the map runs, so the
    # dual-header detection never fires and the 400 is never returned.
    underscores_in_headers on;

    # ── Dual-length header detection ─────────────────────────────────────────
    # $reject_dual_header is non-empty only when the request supplies a
    # non-empty Transfer-Encoding *and* a non-empty Content-Length – the
    # exact precondition for CL.TE / TE.CL request smuggling.
    map "$http_transfer_encoding:$http_content_length" $reject_dual_header {
        default              0;
        "~^[^:]+:[^:].+"     1;   # both headers present and non-empty
    }

    server {
        listen 80;
        server_name _;

        # Block ambiguous dual-length requests at the edge.
        if ($reject_dual_header) {
            return 400 "Ambiguous request rejected – dual length headers\n";
        }

        location / {
            proxy_pass              http://cache-layer:6081;
            proxy_http_version      1.1;

            # Force Connection close to prevent connection-reuse smuggling.
            proxy_set_header        Connection "close";
            proxy_set_header        Host $host;
            proxy_set_header        X-Real-IP $remote_addr;

            # ── Key mitigations ────────────────────────────────────────────
            # Strip Transfer-Encoding so downstream services cannot be confused
            # by a TE header that was already parsed by Nginx.
            proxy_set_header        Transfer-Encoding "";

            # Buffer the full request before forwarding; this prevents partial
            # writes that leave smuggled bytes in the upstream socket buffer.
            proxy_request_buffering on;
        }
    }
}
