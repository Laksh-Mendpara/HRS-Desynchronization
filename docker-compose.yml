# =============================================================================
# Updated Docker Compose – High-Observability HRS Lab
# =============================================================================

networks:
  internal:
    driver: bridge

services:
  # ── Nginx – Layer 7 Proxy (Vulnerable Config) ──────────────────────────────
  frontend-proxy:
    build:
      context: ./nginx
    ports:
      - "80:80"
    depends_on:
      - cache-layer
    networks:
      - internal

  # ── Varnish – Caching Layer ────────────────────────────────────────────────
  cache-layer:
    build:
      context: ./varnish
    expose:
      - "6081"
    depends_on:
      - backend-origin
    networks:
      - internal

  # ── Native Go Backend – The Desync Engine ──────────────────────────────────
  backend-origin:
    build:
      context: ./backend
    expose:
      - "8000"
    networks:
      - internal

  # ── Network Sniffer – Packet Capture (Observability Upgrade) ───────────────
  # This container captures the raw traffic between Varnish and the Backend.
  # We use 'netshoot', a powerful networking Swiss Army knife.
  network-sniffer:
    image: nicolaka/netshoot
    # Join the backend's network namespace to sniff its traffic
    network_mode: "service:backend-origin"
    volumes:
      - ./captures:/captures
    # -i any: listen on all interfaces
    # -w: write to file
    # port 8000: filter for backend traffic
    command: tcpdump -i any -s 0 -w /captures/smuggling_trace.pcap port 8000
    depends_on:
      - backend-origin