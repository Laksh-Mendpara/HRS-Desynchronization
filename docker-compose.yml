version: "3.9"

networks:
  internal:
    driver: bridge

services:
  frontend-proxy:
    build:
      context: ./nginx
    ports:
      - "80:80"
    depends_on:
      - cache-layer
    networks:
      - internal

  cache-layer:
    build:
      context: ./varnish
    expose:
      - "6081"
    depends_on:
      - backend-origin
    networks:
      - internal

  backend-origin:
    build:
      context: ./backend
    expose:
      - "8000"
    networks:
      - internal
